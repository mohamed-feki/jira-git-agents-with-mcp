server:
  port: 8083

spring:
  application:
    name: github-agent

github:
  api-base-url: ${GITHUB_API_BASE_URL:https://api.github.com}
  token: ${GITHUB_TOKEN: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}
  owner: ${GITHUB_OWNER:mohamed-feki}
  repository: ${GITHUB_REPOSITORY:stage}
  committer-name: ${GITHUB_COMMITTER_NAME:agentic-github-agent}
  committer-email: ${GITHUB_COMMITTER_EMAIL:agentic-github-agent@users.noreply.github.com}
  connect-timeout-ms: 5000
  response-timeout-ms: 20000

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    root: INFO
    com.agentic.githubagent: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:4200}
