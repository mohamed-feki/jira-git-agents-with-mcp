              JIRA_URL: ${JIRA_URL:https://mohamedfeki.atlassian.net}              # e.g. https://yourorg.atlassian.net
              JIRA_USERNAME: ${JIRA_USERNAME:medfeki04@gmail.com}    # your Atlassian account email
              JIRA_API_TOKEN: ${JIRA_API_TOKEN:ATATT3xFfGF0v7E9hMLQ-cnRkIKhx_qAHssFtl6a-buXe-L9-oqqWa0MLmDtJ44pH9f-JrvXan5mkGCSNlQbfnuN_qS-3RM7JZr51sNXo7AUvHVkJ3h9cYSJhxnSktG}  # API token from id.atlassian.com

server:
  port: 8081
