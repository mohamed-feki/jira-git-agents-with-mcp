    ollama:
      base-url: ${OLLAMA_BASE_URL:http://localhost:11434}
      chat:
        options:
          model: ${OLLAMA_MODEL:llama3.1}

    mcp:
      client:
        servers:
          jira:
            transport: STDIO
            command: npx
            args:
              - -y
              - mcp-atlassian
